<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="teech.au">
  <title>teech.au</title>
  <!--
    teech.au — Favicon
    Optimised for 16×16 and 32×32 rendering.
    At very small sizes, the full "ee" is hard to read,
    so we use just the teal second "e" on the navy tile.
    This preserves the brand signature at minimum size.
  -->

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#152345"/>

  <!-- Single teal 'e' — readable at 16px, distinctive brand mark -->
  <text
    x="4"
    y="25"
    font-size="24"
    font-weight="900"
    font-family="'Nunito', 'Poppins', system-ui, sans-serif"
    fill="#14B8A6"
    dominant-baseline="auto"
  >e</text>
</svg>
