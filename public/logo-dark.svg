<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="teech.au">
  <title>teech.au</title>

  <!--
    teech.au — Dark Background Wordmark
    Background: #090F1B (sampled from logo image)
    Use for: OG images, email headers, presentation slides, print.
  -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=block');
      .wm {
        font-family: 'Nunito', 'Poppins', 'Trebuchet MS', system-ui, sans-serif;
        font-weight: 900;
        font-style: normal;
      }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="520" height="120" fill="#090F1B" rx="0" ry="0"/>

  <!-- Wordmark: te[e]ch.au -->
  <text
    class="wm"
    x="20"
    y="84"
    font-size="80"
    letter-spacing="-1"
    dominant-baseline="auto"
  >
    <tspan fill="#F8FBF9">te</tspan><tspan fill="#14B8A6">e</tspan><tspan fill="#F8FBF9">ch</tspan><tspan fill="rgba(20,184,166,0.52)">.au</tspan>
  </text>
</svg>
