<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="teech.au app icon">
  <title>teech.au</title>

  <!--
    teech.au — App Icon
    The "ee" mark: white first e, teal second e.
    Background: #152345 (sampled from logo icon tile)
    Rounded corners: rx="36" for the Apple-style squircle approximation.
    Use for: App Store icon, favicon, PWA icon, social avatar.

    Export at: 512×512, 192×192, 180×180, 32×32 (favicon)
  -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=block');
      .ic {
        font-family: 'Nunito', 'Poppins', 'Trebuchet MS', system-ui, sans-serif;
        font-weight: 900;
        font-style: normal;
      }
    </style>
  </defs>

  <!-- Icon background — rounded square, slightly lighter navy than page -->
  <rect
    x="0" y="0"
    width="200" height="200"
    rx="36" ry="36"
    fill="#152345"
  />

  <!-- "ee" mark — white e then teal e, horizontally centred -->
  <!--
    At font-size 96 in Nunito 900:
    Each 'e' is approximately 88px wide.
    Two e's together ≈ 176px. Centre offset: (200-176)/2 = 12px.
    Baseline y: 200*0.68 = 136px (visual centre with cap-height)
  -->
  <text
    class="ic"
    x="12"
    y="138"
    font-size="96"
    letter-spacing="-2"
    dominant-baseline="auto"
    text-anchor="start"
  >
    <tspan fill="#F8FBF9">e</tspan><tspan fill="#14B8A6">e</tspan>
  </text>
</svg>
